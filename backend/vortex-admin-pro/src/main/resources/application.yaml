spring:
  application:
    name: vortex-admin-pro

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: dummy-client-id
            client-secret: dummy-client-secret
          github:
            client-id: dummy-client-id
            client-secret: dummy-client-secret

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 300000
      max-lifetime: 900000
      keepalive-time: 120000
      connection-timeout: 30000
      connection-test-query: SELECT 1

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        default_batch_fetch_size: 20
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true

  mail:
    host: ${MAIL_HOST:}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
  health:
    mail:
      enabled: false

vortex:
  cors:
    allowedOrigins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
  app:
    jwtSecret: ${JWT_SECRET}
    frontendUrl: ${FRONTEND_URL:http://localhost:5173}
    mailFrom: ${MAIL_FROM:no-reply@vortexadmin.com}
  ai:
    gemini:
      key: ""
  report:
    email: ${REPORT_EMAIL:diwooo1661@gmail.com}