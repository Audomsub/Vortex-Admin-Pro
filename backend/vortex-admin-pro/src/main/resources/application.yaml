spring:
  application:
    name: vortex-admin-pro

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: dummy-client-id
            client-secret: dummy-client-secret
          github:
            client-id: dummy-client-id
            client-secret: dummy-client-secret

  datasource:
    url: ${DB_URL:jdbc:postgresql://aws-1-ap-northeast-1.pooler.supabase.com:5432/postgres}
    username: ${DB_USERNAME:postgres.boskcvexjyixxyhxczpe}
    password: ${DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver
    hikari:
      minimum-idle: 2
      maximum-pool-size: 5
      idle-timeout: 30000
      max-lifetime: 60000
      keepalive-time: 25000
      connection-timeout: 20000
      connection-test-query: SELECT 1

  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    show-sql: false
    properties:
      hibernate:
        format_sql: false

  mail:
    host: ${MAIL_HOST:}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
  health:
    mail:
      enabled: false

vortex:
  app:
    frontendUrl: ${FRONTEND_URL:http://localhost:5173}
    mailFrom: ${MAIL_FROM:no-reply@vortexadmin.com}
  ai:
    gemini:
      key: ""
  report:
    email: ${REPORT_EMAIL:diwooo1661@gmail.com}