services:
  db:
    image: postgres:16-alpine
    container_name: vortex-db
    environment:
      POSTGRES_DB: vortex-admin
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-1234}
    ports:
      - "5432:5432"
    volumes:
      - vortex_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d vortex-admin"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend/vortex-admin-pro
    container_name: vortex-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/vortex-admin
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-1234}
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: vortex-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  vortex_pgdata:
